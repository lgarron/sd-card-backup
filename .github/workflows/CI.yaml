name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: make lint
      - run: make test-go
      - run: make test-build-lib
      - run: make test-build-bin
